name: Bito sync (full)

# Daily full sync from Bito ERP to Supabase.
# Same as the hourly incremental workflow, plus:
#   - Creates new Supabase products for Bito items that have no match yet
#   - Creates new categories (incremental only refreshes existing ones)
#   - Syncs bito_customers + bito_employees (rarely change, no need hourly)
#
# Runs at 04:00 UTC = 09:00 Tashkent (off-peak). Use workflow_dispatch to
# trigger manually after bulk catalog edits in Bito.
#
# Required GitHub repo secrets:
#   SUPABASE_DSN          - Postgres connection string (read+write)
#   BITO_API_KEY          - "<login>:<token>" pair from Bito Integration API
# Optional (have safe defaults):
#   BITO_BASE_URL         - Bito API base URL
#   BITO_PRICE_ID         - Bito price catalog id

# Render Cron is the single automatic scheduler. GitHub Actions is manual-only
# fallback to avoid duplicate concurrent writes to Supabase.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply changes (false = dry-run summary only)'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: bito-sync-full
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/scripts/bito-sync/requirements.txt

      - name: Install Python deps
        run: pip install -r backend/scripts/bito-sync/requirements.txt

      - name: Run sync.py --mode=full
        env:
          SUPABASE_DSN: ${{ secrets.SUPABASE_DSN }}
          BITO_API_KEY: ${{ secrets.BITO_API_KEY }}
          BITO_BASE_URL: ${{ secrets.BITO_BASE_URL || 'https://api.bito.uz/integration-api/integration/api/v2' }}
          BITO_PRICE_ID: ${{ secrets.BITO_PRICE_ID || '6706187e485b322ea8c90155' }}
        run: |
          APPLY_FLAG=""
          if [ "${{ github.event.inputs.apply }}" = "true" ]; then
            APPLY_FLAG="--apply"
          fi
          python backend/scripts/bito-sync/sync.py --mode=full $APPLY_FLAG
