services:
  - type: web
    name: dekorhouse-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: SUPABASE_URL
        value: https://yjfyvedavmrdifmepvkh.supabase.co
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: FRONTEND_URL
        value: https://dekorhouse-web.onrender.com
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_ORG
        value: dekorhouse
      - key: SENTRY_PROJECT_BACKEND
        value: backend

  - type: web
    name: dekorhouse-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*\n        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://dekorhouse-api.onrender.com/api
      - key: VITE_BOT_USERNAME
        value: DecorMarketUz_Bot
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_ENVIRONMENT
        value: production
      - key: SENTRY_ORG
        value: dekorhouse
      - key: SENTRY_PROJECT_FRONTEND
        value: frontend

  # ----------------------------------------------------------------------
  # Bito -> Supabase sync (incremental, hourly).
  #
  # Pulls fresh stock / price / per-warehouse data and category moves from
  # Bito ERP and updates already-linked Supabase products. Diff-aware, so
  # a no-op run makes near-zero load on the Supabase pooler. Bito does not
  # expose webhooks (verified: all POST endpoints 404), so a scheduled poll
  # is the closest we can get to real-time.
  #
  # GitHub Actions remains manual-only fallback. Render is the single automatic
  # scheduler; the sync also takes a PostgreSQL advisory lock.
  #
  # Render Cron Jobs require the Starter plan ($7/mo).
  # ----------------------------------------------------------------------
  - type: cron
    name: bito-sync-incremental
    runtime: python
    region: frankfurt
    plan: starter
    rootDir: backend/scripts/bito-sync
    schedule: "10 * * * *"  # hourly at :10; daily full sync runs at 04:00
    buildCommand: pip install -r requirements.txt
    startCommand: python sync.py --mode=incremental --apply
    envVars:
      - key: SUPABASE_DSN
        sync: false
      - key: BITO_BASE_URL
        value: https://api.bito.uz/integration-api/integration/api/v2
      - key: BITO_API_KEY
        sync: false
      - key: BITO_PRICE_ID
        value: "6706187e485b322ea8c90155"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ORG
        value: dekorhouse

  # ----------------------------------------------------------------------
  # Bito -> Supabase sync (full, daily).
  #
  # Runs once per day at 04:00 UTC (09:00 Tashkent). Same as incremental,
  # plus: creates new products for Bito items without a match, creates new
  # categories, syncs customers + employees.
  # ----------------------------------------------------------------------
  - type: cron
    name: bito-sync-full
    runtime: python
    region: frankfurt
    plan: starter
    rootDir: backend/scripts/bito-sync
    schedule: "0 4 * * *"   # daily at 04:00 UTC = 09:00 Tashkent
    buildCommand: pip install -r requirements.txt
    startCommand: python sync.py --mode=full --apply
    envVars:
      - key: SUPABASE_DSN
        sync: false
      - key: BITO_BASE_URL
        value: https://api.bito.uz/integration-api/integration/api/v2
      - key: BITO_API_KEY
        sync: false
      - key: BITO_PRICE_ID
        value: "6706187e485b322ea8c90155"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ORG
        value: dekorhouse
