name: Bito sync (incremental)

# Hourly incremental sync from Bito ERP to Supabase.
# Updates: stock / price / inStock / categoryId / bitoSku / bitoNumber and
# product_warehouse_stocks for *already linked* products. Does NOT create
# new products — that's the daily "full" workflow.
#
# Diff-aware: only emits UPDATE/UPSERT statements for rows whose values
# actually changed in Bito, so a no-op run makes near-zero load on the
# Supabase pooler.
#
# Bito does not expose webhooks (verified: all POST endpoints 404), so a
# scheduled poll is the closest we can get to real-time without paying for
# a permanent worker. Typical run completes in ~10-20 seconds.
#
# The mirror schedule lives in render.yaml (Render Cron Job on the Starter
# plan, $7/mo). GitHub Actions is the free fallback and runs in parallel
# — it's idempotent so running both is safe.
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_DSN          - Postgres connection string (read+write)
#   BITO_API_KEY          - "<login>:<token>" pair from Bito Integration API
# Optional (have safe defaults):
#   BITO_BASE_URL         - Bito API base URL
#   BITO_PRICE_ID         - Bito price catalog id

# Render Cron is the single automatic scheduler. GitHub Actions is manual-only
# fallback to avoid duplicate concurrent writes to Supabase.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply changes (false = dry-run summary only)'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  # If a previous run is still going (slow Bito or Supabase), skip the new
  # one rather than queueing — daily full sync handles any drift anyway.
  group: bito-sync-incremental
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/scripts/bito-sync/requirements.txt

      - name: Install Python deps
        run: pip install -r backend/scripts/bito-sync/requirements.txt

      - name: Run sync.py --mode=incremental
        env:
          SUPABASE_DSN: ${{ secrets.SUPABASE_DSN }}
          BITO_API_KEY: ${{ secrets.BITO_API_KEY }}
          BITO_BASE_URL: ${{ secrets.BITO_BASE_URL || 'https://api.bito.uz/integration-api/integration/api/v2' }}
          BITO_PRICE_ID: ${{ secrets.BITO_PRICE_ID || '6706187e485b322ea8c90155' }}
        run: |
          APPLY_FLAG=""
          if [ "${{ github.event.inputs.apply }}" = "true" ]; then
            APPLY_FLAG="--apply"
          fi
          python backend/scripts/bito-sync/sync.py --mode=incremental $APPLY_FLAG
