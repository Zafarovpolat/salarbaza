services:
  - type: web
    name: dekorhouse-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: ADMIN_PASSWORD
        value: "8888"
      - key: FRONTEND_URL
        value: https://dekorhouse-web.onrender.com
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: dekorhouse-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://dekorhouse-api.onrender.com/api
      - key: VITE_BOT_USERNAME
        value: DecorMarketUz_Bot

  # ----------------------------------------------------------------------
  # Bito stock+price polling cron.
  #
  # Pulls fresh stock/price/per-warehouse data from Bito every 5 minutes and
  # updates Supabase (read-only on Bito's side). Bito does not expose
  # webhooks, so this is the closest we can get to real-time without paying
  # for a permanent worker. Typical run completes in ~20s.
  #
  # Render Cron Jobs require the Starter plan ($7/mo). If you stay on the
  # free plan, use the equivalent GitHub Actions workflow at
  # .github/workflows/bito-sync-stock.yml — it runs on the same schedule,
  # against the same script, for free.
  # ----------------------------------------------------------------------
  - type: cron
    name: bito-sync-stock
    runtime: python
    region: frankfurt
    plan: starter
    rootDir: backend/scripts/bito-sync
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python sync_stock.py
    envVars:
      - key: SUPABASE_DSN
        sync: false
      - key: BITO_BASE_URL
        value: https://api.bito.uz/integration-api/integration/api/v2
      - key: BITO_API_KEY
        sync: false
      - key: BITO_PRICE_ID
        value: "6706187e485b322ea8c90155"
