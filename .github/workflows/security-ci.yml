name: Build, tests and security checks
on: {pull_request: {}, push: {branches: [master]}}
permissions: {contents: read}
jobs:
 backend:
  runs-on: ubuntu-latest
  services:
   postgres:
    image: postgres:17
    env: {POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: test}
    ports: ['5432:5432']
    options: >-
     --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 5s --health-retries 10
  env: {DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/test', DIRECT_URL: 'postgresql://postgres:postgres@localhost:5432/test'}
  defaults: {run: {working-directory: backend}}
  steps:
   - uses: actions/checkout@v4
   - uses: actions/setup-node@v4
     with: {node-version: '20', cache: npm, cache-dependency-path: backend/package-lock.json}
   - run: npm ci
   - run: npm run lint
   - run: npm test
   - run: npx prisma migrate deploy
   - run: npx prisma generate
   - run: npm run build
   - run: npm audit --omit=dev --audit-level=high
 frontend:
  runs-on: ubuntu-latest
  defaults: {run: {working-directory: frontend}}
  steps:
   - uses: actions/checkout@v4
   - uses: actions/setup-node@v4
     with: {node-version: '20', cache: npm, cache-dependency-path: frontend/package-lock.json}
   - run: npm ci
   - run: npm run lint
   - run: npm test
   - run: npm run build
   - run: npm audit --omit=dev --audit-level=high
 python:
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v4
   - uses: actions/setup-python@v5
     with: {python-version: '3.12'}
   - run: python -m unittest discover -s backend/scripts/bito-sync/tests -v
